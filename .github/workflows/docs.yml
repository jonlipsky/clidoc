name: Deploy Documentation

on:
  push:
    branches: [ release ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build clidoc
        run: dotnet build --no-restore --configuration Release

      - name: Emit clidoc's own commands.json (dogfooding)
        run: |
          mkdir -p build-site
          dotnet run --project src/CliDoc/CliDoc.csproj --no-build --configuration Release -- \
            commands --output build-site/commands.json

      - name: Render documentation site
        run: |
          dotnet run --project src/CliDoc/CliDoc.csproj --no-build --configuration Release -- \
            generate docs \
            --commands-json build-site/commands.json \
            --metadata cli-docs.yaml \
            --output build-site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './build-site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
