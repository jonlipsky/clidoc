name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Extract version from csproj ──────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          CSPROJ="src/CliDoc/CliDoc.csproj"
          RAW_VERSION=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ")

          # Split into base version and optional pre-release suffix
          BASE=$(echo "$RAW_VERSION" | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+')
          SUFFIX=$(echo "$RAW_VERSION" | grep -oP '[-].+$' || true)

          # Extract major.minor, use run_number as patch
          MAJOR_MINOR=$(echo "$BASE" | grep -oP '^[0-9]+\.[0-9]+')
          FULL_VERSION="${MAJOR_MINOR}.${{ github.run_number }}${SUFFIX}"

          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $FULL_VERSION"

  # ── Job 2: Build and test ────────────────────────────────────────────
  build:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ env.VERSION }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack --no-build --configuration Release --output ./nupkg -p:PackageVersion=${{ env.VERSION }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg

  # ── Job 3: Publish release ────────────────────────────────────────────
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Push NuGet package
        run: dotnet nuget push ./artifacts/nuget-package/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create git tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build release notes
          cat > release-notes.md << 'NOTES'
          ## clidoc v${{ env.VERSION }}

          Generate beautiful static documentation websites for CLI tools.

          ### Packages

          Two packages ship from this release, both at the same version:

          - **`clidoc`** — the global .NET tool that renders the site.
          - **`Clidoc.SystemCommandLine`** — library for System.CommandLine apps to emit `commands.json` from inside themselves (DI-friendly).

          ### Install the tool

          ```bash
          dotnet tool install --global clidoc --version ${{ env.VERSION }}
          # or update an existing install:
          dotnet tool update --global clidoc
          ```

          ### Use the companion NuGet

          ```bash
          dotnet add package Clidoc.SystemCommandLine --version ${{ env.VERSION }}
          ```

          ```csharp
          using Clidoc.SystemCommandLine;

          var root = new RootCommand("My CLI");
          // ... register your commands ...
          root.AddCommandsSubcommand();          // mycli commands --output commands.json
          return await root.Parse(args).InvokeAsync();
          ```

          Then:

          ```bash
          mycli commands --output commands.json
          clidoc generate commands.json --output docs
          ```

          See the [companion NuGet guide](https://github.com/jonlipsky/clidoc/blob/main/docs/companion-nuget.md) for details.

          ### NuGet

          - https://www.nuget.org/packages/clidoc/${{ env.VERSION }}
          - https://www.nuget.org/packages/Clidoc.SystemCommandLine/${{ env.VERSION }}

          ### Documentation

          https://jonlipsky.github.io/clidoc
          NOTES

          gh release create "v${{ env.VERSION }}" \
            --title "clidoc v${{ env.VERSION }}" \
            --notes-file release-notes.md \
            ./artifacts/nuget-package/*.nupkg

      - name: Job summary
        run: |
          echo "## clidoc Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`v${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [\`clidoc\`](https://www.nuget.org/packages/clidoc/${{ env.VERSION }}) — global tool" >> $GITHUB_STEP_SUMMARY
          echo "- [\`Clidoc.SystemCommandLine\`](https://www.nuget.org/packages/Clidoc.SystemCommandLine/${{ env.VERSION }}) — companion library" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "dotnet tool install --global clidoc --version ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "dotnet add package Clidoc.SystemCommandLine --version ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

