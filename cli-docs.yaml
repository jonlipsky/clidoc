site:
  title: "CliDoc"
  tagline: "Beautiful static documentation for any CLI tool."
  baseUrl: https://jonlipsky.github.io/clidoc
  githubUrl: https://github.com/jonlipsky/clidoc
  packageId: clidoc
  quickstart:
    - name: "Document a simple CLI"
      steps:
        - title: "Install clidoc"
          command: "dotnet tool install --global clidoc"
          description: "Installs the global tool used to render the site."
        - title: "Extract commands.json from your project"
          command: "clidoc generate commands --project src/MyCli/MyCli.csproj"
          description: "Builds the project and reflects over the output to produce ./commands.json. Picks up `<ToolCommandName>` automatically."
        - title: "Render the site"
          command: "clidoc generate docs --output docs"
          description: "Uses ./commands.json in the current directory. Add `--metadata cli-docs.yaml` to enrich the output with examples and custom sections."

    - name: "Document a complex CLI"
      steps:
        - title: "Install clidoc"
          command: "dotnet tool install --global clidoc"
          description: "Installs the global tool used to render the site."
        - title: "Add the companion NuGet to your CLI"
          command: "dotnet add package Clidoc.SystemCommandLine"
          description: "Lets your app emit commands.json from inside itself — so dependency injection and any other runtime wiring is fully live when the command tree is walked."
        - title: "Expose a commands subcommand"
          command: "rootCommand.AddCommandsSubcommand();"
          description: "One-line change in your Program.cs, typically right after you register your own commands and their DI-injected services."
        - title: "Emit commands.json and render the site"
          command: "mycli commands --output commands.json && clidoc generate docs --output docs"
          description: "Run your own CLI to produce commands.json, then hand it to clidoc. Open `docs/commands.html` to browse."

    - name: "Document a non-.NET CLI"
      steps:
        - title: "Install clidoc"
          command: "dotnet tool install --global clidoc"
          description: "clidoc itself is a .NET tool, but the input contract (commands.json) is language-agnostic."
        - title: "Emit a conforming commands.json"
          description: "Write a small script in your language of choice (Python, Go, Rust, Node — anything) that produces a `commands.json` matching the [schema](https://github.com/jonlipsky/clidoc/blob/main/docs/commands-json-schema.md). Only the structural fields are required; examples and sections are optional."
        - title: "Render the site"
          command: "clidoc generate docs --commands-json commands.json --output docs"
          description: "Same rendering path as .NET tools. Add a `cli-docs.yaml` with taglines, quick-start scenarios, and prose sections to customize the landing page."

    - name: "Customize with cli-docs.yaml"
      steps:
        - title: "Scaffold a metadata file"
          command: "clidoc init"
          description: "Reads ./commands.json and writes a cli-docs.yaml with an entry for every command."
        - title: "Edit taglines, examples, and sections"
          description: "Set site.title, site.tagline, site.quickstart, per-command taglines and examples, and long-form prose sections."
        - title: "Re-render"
          command: "clidoc generate docs --output docs"
          description: "Rebuild the site. The yaml is picked up automatically from ./cli-docs.yaml."

commands:
  "clidoc":
    tagline: "A .NET global tool that generates beautiful static documentation websites for CLI tools built with System.CommandLine"
    sections:
      - title: Features
        body: |
          - **Beautiful UI**
            Dark and light theme support with automatic persistence
          - **Multiple Views**
            Column, tree, and list layouts for browsing commands
          - **Search**
            Filter commands by name and description
          - **Copy-to-Clipboard**
            Easily copy example commands for quick pasting into a terminal
          - **Responsive**
            Works on mobile and desktop
          - **llms.txt**
            Plain-text reference for LLM consumption
          - **Metadata Enrichment**
            Add examples, sections, and custom descriptions via YAML
          - **System.CommandLine integration**
            Drop-in NuGet for .NET CLIs — emit commands.json from inside your app, DI and all

  "clidoc init":
    tagline: "Generate a cli-docs.yaml scaffold from an assembly"
    examples:
      - description: Generate metadata file for a CLI tool
        command: clidoc init --assembly MyApp.dll
      
      - description: Specify output file location
        command: clidoc init --assembly MyApp.dll --output docs/cli-docs.yaml
      
      - description: Specify entry point type explicitly
        command: clidoc init --assembly MyApp.dll --entry-type MyApp.Program
      
      - description: Override root command name
        command: clidoc init --assembly MyApp.dll --root-name myapp
    
    sections:
      - title: Entry Point Discovery
        body: |
          clidoc automatically discovers your command entry point using the following strategies:
          
          1. If --entry-type is specified, looks for a static method in that type
          2. Scans for well-known method names: GetRootCommand, CreateRootCommand, BuildCommandLine
          3. Searches all public types for static methods returning RootCommand or Command
          
          If discovery fails, use --entry-type to point to the class with your command builder method.

  "clidoc generate":
    tagline: "Generate static documentation site from an assembly and optional metadata"
    examples:
      - description: Generate site with default settings
        command: clidoc generate --assembly MyApp.dll
      
      - description: Specify metadata file and output directory
        command: clidoc generate --assembly MyApp.dll --metadata cli-docs.yaml --output docs
      
      - description: Override site title
        command: clidoc generate --assembly MyApp.dll --title "My CLI Tool"
      
      - description: Specify entry point and base URL
        command: clidoc generate --assembly MyApp.dll --entry-type MyApp.Program --base-url https://docs.example.com
      
      - description: Skip llms.txt generation
        command: clidoc generate --assembly MyApp.dll --no-llms-txt
    
    sections:
      - title: Output Structure
        body: |
          The generated site includes:
          
          - **commands.html** - Main documentation browser with sidebar and detail views
          - **commands.json** - Machine-readable command reference
          - **commands.js** - JavaScript bundle with data
          - **style.css** - Stylesheet with theme support
          - **index.html** - Landing page (if site config exists in metadata)
          - **llms.txt** - Plain-text reference (unless --no-llms-txt is used)
      
      - title: Metadata File
        body: |
          The cli-docs.yaml file allows you to enrich auto-discovered command structure:
          
          - **tagline** - Override command descriptions
          - **examples** - Add usage examples with copy-to-clipboard
          - **sections** - Add markdown content (installation, guides, etc.)
          - **site** - Configure title, tagline, logo, favicon, base URL, theme
          
          Structure from the assembly (commands, options, arguments) is always preserved.
          Metadata can only add documentation, not modify command structure.
      
      - title: Theming
        body: |
          The generated site includes:
          
          - Automatic dark/light theme with localStorage persistence
          - Theme toggle button in the header
          - CSS variables for easy customization
          - Optional accent color override via metadata
