<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Reference</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">Commands</h1>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="column" title="Column view">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <rect x="1" y="3" width="4" height="2" rx="1"/>
                            <rect x="6" y="3" width="4" height="2" rx="1"/>
                            <rect x="11" y="3" width="4" height="2" rx="1"/>
                            <rect x="1" y="7" width="4" height="2" rx="1"/>
                            <rect x="6" y="7" width="4" height="2" rx="1"/>
                            <rect x="11" y="7" width="4" height="2" rx="1"/>
                            <rect x="1" y="11" width="4" height="2" rx="1"/>
                            <rect x="6" y="11" width="4" height="2" rx="1"/>
                            <rect x="11" y="11" width="4" height="2" rx="1"/>
                        </svg>
                    </button>
                    <button class="view-btn" data-view="tree" title="Tree view">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <rect x="1" y="2" width="14" height="2" rx="1"/>
                            <rect x="3" y="6" width="12" height="2" rx="1"/>
                            <rect x="3" y="10" width="12" height="2" rx="1"/>
                        </svg>
                    </button>
                    <button class="view-btn" data-view="list" title="List view">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <rect x="1" y="3" width="14" height="2" rx="1"/>
                            <rect x="1" y="7" width="14" height="2" rx="1"/>
                            <rect x="1" y="11" width="14" height="2" rx="1"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11.5 6.5a5 5 0 11-10 0 5 5 0 0110 0zM15 15l-3.5-3.5"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search commands..." />
            </div>
            
            <div id="command-browser" class="command-browser"></div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <div class="content-header">
                <div class="theme-toggle">
                    <button id="theme-toggle" aria-label="Toggle theme">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <circle cx="10" cy="10" r="3"/>
                            <path d="M10 1v2m0 14v2M4.22 4.22l1.42 1.42m8.72 8.72l1.42 1.42M1 10h2m14 0h2M4.22 15.78l1.42-1.42m8.72-8.72l1.42-1.42"/>
                        </svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="command-detail" class="command-detail">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="currentColor" opacity="0.2">
                        <rect x="8" y="16" width="48" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M16 24l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none"/>
                        <line x1="28" y1="36" x2="40" y2="36" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <p>Select a command to view details</p>
                </div>
            </div>
        </main>
    </div>

    <script src="commands.js"></script>
    <script>
        // Initialize the app
        if (window.__CLIDOC_DATA__) {
            window.clidocApp = new CliDocApp(window.__CLIDOC_DATA__);
        }
    </script>
</body>
</html>
