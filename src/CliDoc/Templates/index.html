<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_TITLE}}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" class="landing-page">
    <nav class="top-nav">
        <div class="nav-content">
            <div class="nav-brand">{{SITE_TITLE}}</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="commands.html" class="nav-link">Commands</a>
                {{#if GITHUB_URL}}
                <a href="{{GITHUB_URL}}" class="nav-link" target="_blank">GitHub</a>
                {{/if}}
                <a href="llms.txt" class="nav-link">llms.txt</a>
                <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    <div class="landing-container">
        <header class="landing-header">
            {{#if LOGO}}
            <img src="{{LOGO}}" alt="Logo" class="logo">
            {{/if}}
            <h1>{{SITE_TITLE}}</h1>
            {{#if TAGLINE}}
            <p class="tagline">{{TAGLINE}}</p>
            {{/if}}
        </header>

        <main class="landing-main">
            <section class="install-section">
                <h2>Installation</h2>
                <div class="code-block">
                    <code>dotnet tool install --global {{PACKAGE_ID}}</code>
                    <button class="copy-btn" onclick="copyToClipboard(this)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M4 2a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V2z"/>
                            <path d="M2 6a2 2 0 00-2 2v6a2 2 0 002 2h6a2 2 0 002-2H6a4 4 0 01-4-4V6z"/>
                        </svg>
                    </button>
                </div>
            </section>

            <section class="cta-section">
                <a href="commands.html" class="btn-primary">View Command Reference →</a>
            </section>
        </main>
    </div>

    <script>
        function copyToClipboard(button) {
            const code = button.previousElementSibling.textContent;
            navigator.clipboard.writeText(code).then(() => {
                button.classList.add('copied');
                setTimeout(() => button.classList.remove('copied'), 2000);
            });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.body.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
